name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get next version
        id: vars
        run: |
          # Fetch all tags
          git fetch --tags

          # Get the latest tag matching the pattern v*
          LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            # If no tags exist, start at v2.0
            NEXT_TAG="v2.0"
          else
            # Extract major and minor version
            # Assuming tag format is vX.Y
            VERSION_STR=${LATEST_TAG#v}
            MAJOR=${VERSION_STR%.*}
            MINOR=${VERSION_STR#*.}

            # Increment minor version
            NEXT_MINOR=$((MINOR + 1))
            NEXT_TAG="v$MAJOR.$NEXT_MINOR"
          fi

          echo "next_tag=$NEXT_TAG" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT_TAG"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.next_tag }}
          name: Release ${{ steps.vars.outputs.next_tag }}
          body: |
            Automated release for commit ${{ github.sha }}

            Branch: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
